version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: project_task_management
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: root
      DB_DATABASE: project_task_management
      JWT_SECRET: your_jwt_secret
      JWT_REFRESH_TOKEN_EXPIRES_IN: 1d
      JWT_ACCESS_TOKEN_EXPIRES_IN: 15m
    ports:
      - "4000:4000"
    command: sh -c "npm run build && npm run migration:run && npm start"

volumes:
  db-data:
